<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Санҷиши Telegram</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f4f7f6; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        button { background: #ff9800; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #e68900; }
        button:disabled { background: #ccc; }
        #result { margin-top: 20px; padding: 10px; border-radius: 8px; font-size: 14px; }
    </style>
</head>
<body>

<div class="card">
    <h1>🚀 Bozorcha Bot</h1>
    <button id="sendBtn" onclick="sendTest()">Фиристодани паём</button>
    <div id="result">Омода барои фиристодан...</div>
</div>

<script>
    const FUNCTION_URL = "https://seagtlaujnnhoyitgsdd.supabase.co/functions/v1/test-function-html";
    const ANON_KEY = "sb_publishable_OlLChtOja0i8nIrPZuM_Og_vyfGjfsP";

    async function sendTest() {
        const resultDiv = document.getElementById("result");
        const btn = document.getElementById("sendBtn");

        btn.disabled = true;
        resultDiv.innerHTML = "⏳ Дархост рафта истодааст...";
        resultDiv.style.color = "#007bff";

        try {
            const response = await fetch(FUNCTION_URL, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "apikey": ANON_KEY,
                    "Authorization": `Bearer ${ANON_KEY}`
                },
                body: JSON.stringify({ 
                    message: "🔔 Салом! Ин паём бе воридшавӣ фиристода шуд." 
                })
            });

            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(errorText || "Хатогии сервер");
            }

            resultDiv.innerHTML = "✅ Муваффақият! Паём ба Telegram расид.";
            resultDiv.style.color = "#28a745";
        } catch (error) {
            console.error(error);
            resultDiv.innerHTML = "❌ Хатогӣ: " + error.message;
            resultDiv.style.color = "#dc3545";
        } finally {
            btn.disabled = false;
        }
    }
</script>

</body>
</html>

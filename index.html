<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Анимация на сайте</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f0f0f0;
    }

    .circle {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: #3498db;
      position: relative;
      animation: moveAndColor 4s infinite alternate;
    }

    @keyframes moveAndColor {
      0% {
        transform: translateX(0);
        background: #3498db;
      }
      50% {
        transform: translateX(200px);
        background: #e74c3c;
      }
      100% {
        transform: translateX(0);
        background: #2ecc71;
      }
    }
  </style>
</head>
<body>
  <div class="circle"></div>
</body>
</html>
